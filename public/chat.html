<!doctype html>
<html lang="zh-CN">
<head>
  <meta charset="UTF-8" />
  <meta name="viewport" content="width=device-width, initial-scale=1.0" />
  <title>TB006 问答助手</title>
  <style>
    body { font-family: Arial, sans-serif; background:#f5f7fb; margin:0; }
    .wrap { max-width: 760px; margin: 20px auto; background: #fff; border-radius: 12px; box-shadow: 0 6px 20px rgba(0,0,0,.08); overflow: hidden; }
    .header { background:#2563eb; color:#fff; padding:16px 20px; font-size:18px; font-weight:700; }
    .chat { height: 60vh; overflow-y:auto; padding:16px; }
    .msg { margin:10px 0; line-height:1.6; }
    .user { text-align:right; }
    .bubble { display:inline-block; padding:10px 12px; border-radius:10px; max-width:85%; word-wrap: break-word; }
    .user .bubble { background:#2563eb; color:#fff; }
    .bot .bubble { background:#eef2ff; color:#111827; }
    .meta { font-size:12px; color:#6b7280; margin-top:6px; }
    .input { display:flex; gap:8px; padding:12px; border-top:1px solid #e5e7eb; }
    input { flex:1; padding:10px; border:1px solid #d1d5db; border-radius:8px; font-size:14px; }
    button { background:#2563eb; color:#fff; border:none; border-radius:8px; padding:10px 14px; cursor:pointer; }
    .tips { font-size:12px; color:#6b7280; padding:0 12px 12px; }
    /* 超链接样式 */
    .bubble a { color: #2563eb; text-decoration: underline; font-weight: bold; }
  </style>
</head>
<body>
  <div class="wrap">
    <div class="header">TB006 问答助手</div>
    <div id="chat" class="chat">
      <div class="msg bot">
        <div class="bubble">您好！我是 TB006 问答助手。为了确保回复准确，请<b>每次输入一个</b>具体问题。<br><br>您可以试着输入：药物介绍、怎么入组、价格、副作用、或者是药物原理。</div>
      </div>
    </div>
    <div class="input">
      <input id="q" placeholder="请一次只输入一个问题（例如：效果）" />
      <button id="send">发送</button>
    </div>
    <div class="tips">仅供信息检索参考，最终以医疗专业判断和官方文件为准。</div>
    <div class="tips">💡 小贴士：建议一次只问一个问题，匹配更精准。若 AI 无法回答，请点击右下角气泡留言并留下Email。</div>
  </div>

  <script>
    const chat = document.getElementById("chat");
    const input = document.getElementById("q");
    const sendBtn = document.getElementById("send");

    function addMsg(role, text, meta = "") {
      const div = document.createElement("div");
      div.className = "msg " + role;
      
      // 1. 处理换行 \n
      let formattedText = text.replace(/\n/g, "<br>");
      
      // 2. 处理 Markdown 链接 [文字](链接)
      formattedText = formattedText.replace(/\[([^\]]+)\]\(([^\)]+)\)/g, '<a href="$2" target="_blank">$1</a>');

      div.innerHTML = `<div class="bubble">${formattedText}</div>${meta ? `<div class="meta">${meta}</div>` : ""}`;
      chat.appendChild(div);
      chat.scrollTop = chat.scrollHeight;
    }

    async function ask() {
      const question = input.value.trim();
      if (!question) return;
      addMsg("user", question);
      input.value = "";

      try {
        const res = await fetch("/api/ask", {
          method: "POST",
          headers: { "Content-Type": "application/json" },
          body: JSON.stringify({ question })
        });
        const data = await res.json();

        if (!data.found) {
          addMsg("bot", "抱歉，我没能完全理解您的问题。建议您尝试缩短提问或一次只输入一个关键词。您也可以点击右下角人工助手留下Email。");
          return;
        }

        let meta = `分类：${data.category}`;
        if (data.related && data.related.length) {
          meta += ` ｜ 相关：${data.related.map(x => x.question).join("；")}`;
        }
        addMsg("bot", data.answer, meta);
      } catch (e) {
        addMsg("bot", "系统繁忙，请稍后重试。");
      }
    }

    sendBtn.addEventListener("click", ask);
    input.addEventListener("keydown", e => {
      if (e.key === "Enter") ask();
    });
  </script>

  <script type="text/javascript">
    window.$crisp = [];
    window.CRISP_WEBSITE_ID = "8480a6e2-58f9-4c1f-a5ad-c5cdfcaffa0f";
    window.$crisp.push(["set", "session:locale", ["zh-cn"]]);

    (function() {
      var d = document;
      var s = d.createElement("script");
      s.src = "https://client.crisp.chat/l.js";
      s.async = 1;
      d.getElementsByTagName("head")[0].appendChild(s);
    })();

    window.$crisp.push(["on", "session:loaded", function(){
      setTimeout(function() {
        window.$crisp.push(["do", "message:show", ["text", "您好！我是 TB006 先行用药项目的人工助手。目前的咨询量较大，推荐您先尝试咨询 AI 助手，它能更快速地为您解答基本问题。 如仍需人工帮助，请在这里留言并附上您的邮箱，工作人员会尽快回访。谢谢您的理解。"]]);
      }, 2000);
    }]);
  </script>
</body>
</html>
