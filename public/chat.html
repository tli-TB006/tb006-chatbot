<!doctype html>
<html lang="zh-CN">
<head>
  <meta charset="UTF-8" />
  <meta name="viewport" content="width=device-width, initial-scale=1.0" />
  <title>TB006 问答助手</title>
  <style>
    body { font-family: Arial, sans-serif; background:#f5f7fb; margin:0; }
    .wrap { max-width: 760px; margin: 20px auto; background: #fff; border-radius: 12px; box-shadow: 0 6px 20px rgba(0,0,0,.08); overflow: hidden; }
    .header { background:#2563eb; color:#fff; padding:16px 20px; font-size:18px; font-weight:700; }
    .chat { height: 60vh; overflow-y:auto; padding:16px; }
    .msg { margin:10px 0; line-height:1.6; }
    .user { text-align:right; }
    .bubble { display:inline-block; padding:10px 12px; border-radius:10px; max-width:85%; }
    .user .bubble { background:#2563eb; color:#fff; }
    .bot .bubble { background:#eef2ff; color:#111827; }
    .meta { font-size:12px; color:#6b7280; margin-top:6px; }
    .input { display:flex; gap:8px; padding:12px; border-top:1px solid #e5e7eb; }
    input { flex:1; padding:10px; border:1px solid #d1d5db; border-radius:8px; font-size:14px; }
    button { background:#2563eb; color:#fff; border:none; border-radius:8px; padding:10px 14px; cursor:pointer; }
    .tips { font-size:12px; color:#6b7280; padding:0 12px 12px; }
  </style>
</head>
<body>
  <div class="wrap">
    <div class="header">TB006 问答助手</div>
    <div id="chat" class="chat">
      <div class="msg bot">
        <div class="bubble">你好，请输入你的问题。可试：药物介绍、怎么入组、疗效、用药频率、副作用。</div>
      </div>
    </div>
    <div class="input">
      <input id="q" placeholder="请输入问题..." />
      <button id="send">发送</button>
    </div>
    <div class="tips">仅供信息检索参考，最终以医疗专业判断和官方文件为准。</div>
  </div>

  <script>
    const chat = document.getElementById("chat");
    const input = document.getElementById("q");
    const sendBtn = document.getElementById("send");

    function addMsg(role, text, meta = "") {
      const div = document.createElement("div");
      div.className = "msg " + role;
      div.innerHTML = `<div class="bubble">${text}</div>${meta ? `<div class="meta">${meta}</div>` : ""}`;
      chat.appendChild(div);
      chat.scrollTop = chat.scrollHeight;
    }

    async function ask() {
      const question = input.value.trim();
      if (!question) return;
      addMsg("user", question);
      input.value = "";

      try {
        const res = await fetch("/api/ask", {
          method: "POST",
          headers: { "Content-Type": "application/json" },
          body: JSON.stringify({ question })
        });
        const data = await res.json();

        if (!data.found) {
          addMsg("bot", data.answer);
          return;
        }

        let meta = `命中问题：${data.matchedQuestion} ｜ 分类：${data.category}`;
        if (data.related && data.related.length) {
          meta += ` ｜ 相关：${data.related.map(x => x.question).join("；")}`;
        }
        addMsg("bot", data.answer, meta);
      } catch (e) {
        addMsg("bot", "系统繁忙，请稍后重试。");
      }
    }

    sendBtn.addEventListener("click", ask);
    input.addEventListener("keydown", e => {
      if (e.key === "Enter") ask();
    });
  </script>
</body>
</html>
